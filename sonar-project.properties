# Feed the Go coverage report so the quality gate reflects the test suite.
# The Go analyzer already categorizes *_test.go as tests on its own; setting
# sonar.tests=. here would overlap sonar.sources and drop the real source files.
# Generate coverage.out first: go test -coverprofile=coverage.out ./...  (see `make coverage`).
sonar.go.coverage.reportPaths=coverage.out
